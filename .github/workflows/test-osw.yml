name: Test OSW
on: push

jobs:
  test-osw:
    runs-on: ubuntu-latest
    container: # Define the Docker container for the job. All subsequent steps run inside it.
      image: nrel/openstudio:dev-3.11.0
      options: -u root -e "LANG=en_US.UTF-8" # These options are passed to the 'docker run' command internally

    steps:
    - name: check out repository
      uses: actions/checkout@v2
    - name: environment info
      shell: bash 
      run: |
          openstudio --version
          ruby -v
          bundle -v
    - name: install dependencies
      shell: bash 
      run: |
          bundle install
    - name: run workflows
      shell: bash 
      run: |
          bundle exec rake run_all_osws
          # create and and rake tasks that adds more validation of the runs
